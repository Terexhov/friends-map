app = "friends-map"
primary_region = "ams"   # Amsterdam — ближе всего к России

[build]

[env]
  NODE_ENV = "production"
  DATA_DIR = "/data"
  PORT = "8080"

[[mounts]]
  source = "friends_map_data"
  destination = "/data"

[[http_service]]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
